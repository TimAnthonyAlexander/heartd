# heartd configuration. Copy to heartd.yaml next to the binary and edit.
# All sections are optional; sensible defaults are applied for anything omitted.

server:
  name: web-01            # node name shown in the dashboard (default: hostname)
  port: 9300              # HTTP port for API + dashboard
  metrics_interval: 30s   # how often system metrics are sampled
  retention: 7d           # how long samples are kept (rolling window)
  db_path: heartd.db      # SQLite database file
  # basic_auth:           # optional; only needed if the port is public
  #   username: admin
  #   password: change-me

# System-metric alert thresholds (percent). Used by the alerting wave.
thresholds:
  cpu_percent: 90
  mem_percent: 90
  disk_percent: 90

